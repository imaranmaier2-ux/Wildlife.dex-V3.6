<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WILDLIFE DEX // TACTILE CAM V3.8</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100dvh; background: #121110; color: #fff; overflow: hidden; font-family: sans-serif; }
        .camera-container { width: 100%; height: 100%; display: grid; padding: 12px; gap: 10px; grid-template-columns: 140px 1fr 140px; }
        @media (orientation: portrait) { .camera-container { grid-template-columns: 1fr; grid-template-rows: 100px 1fr 120px; } }
        .panel-center { position: relative; width: 100%; height: 100%; border-radius: 24px; overflow: hidden; background: #000; }
        #embedded-live-video { width: 100%; height: 100%; object-fit: cover; }
        .hud-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; }
        .giant-shutter-red { width: 95px; height: 95px; background: #ff3b30; border-radius: 50%; border: none; cursor: pointer; pointer-events: auto; box-shadow: 0 6px 12px rgba(0,0,0,0.5); }
        .result-card { position: absolute; top: 10%; left: 10%; width: 80%; height: 80%; background: #121110; display: none; z-index: 100; padding: 20px; border-radius: 20px; border: 2px solid #d7be9f; }
        #res-name { font-size: 24px; font-weight: 900; color: #fff; }
    </style>
</head>
<body>
    <div class="camera-container">
        <div class="panel-left"></div>
        <div class="panel-center">
            <video id="embedded-live-video" autoplay playsinline muted></video>
            <div id="result-overlay" class="result-card">
                <div id="res-name">INITIALIZING...</div>
                <div id="res-science">Awaiting Data...</div>
                <button onclick="document.getElementById('result-overlay').style.display='none'" style="margin-top:20px; padding:10px;">CLOSE</button>
            </div>
        </div>
        <div class="panel-right">
            <button class="giant-shutter-red" id="shutter-trigger"></button>
        </div>
    </div>

    <script>
        const video = document.getElementById('embedded-live-video');

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
            } catch (err) { alert("Camera Error: " + err.message); }
        }
        initCamera();

        document.getElementById('shutter-trigger').addEventListener('click', async () => {
            const overlay = document.getElementById('result-overlay');
            const resName = document.getElementById('res-name');
            overlay.style.display = "block";
            resName.innerText = "UPLOADING & ANALYZING...";

            const canvas = document.createElement('canvas');
            canvas.width = 640;
            canvas.height = 640 * (video.videoHeight / video.videoWidth);
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('image', blob);
                try {
                    const response = await fetch('https://api.inaturalist.org/v1/computervision/score_image', { method: 'POST', body: formData });
                    const data = await response.json();
                    if (data.results?.length > 0) {
                        resName.innerText = data.results[0].taxon.name.toUpperCase();
                        document.getElementById('res-science').innerText = data.results[0].taxon.preferred_common_name;
                    } else { resName.innerText = "NO MATCH FOUND"; }
                } catch(e) { resName.innerText = "CONNECTION FAILED"; }
            }, 'image/jpeg', 0.8);
        });
    </script>
</body>
</html>
