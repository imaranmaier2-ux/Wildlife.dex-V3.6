<!DOCTYPE html>
<html>
<body style="background:black; color:white; font-family:sans-serif; text-align:center;">
    <h1>App v1.0</h1>
    <video id="vid" autoplay playsinline style="width:100%"></video>
    <button id="btn" style="width:100%; padding:20px; font-size:20px; margin-top:20px;">TEST SCAN & SAVE</button>
    <div id="status" style="margin-top:20px; color:yellow;">Status: Waiting...</div>

    <script>
        const video = document.getElementById('vid');
        const status = document.getElementById('status');

        // 1. Camera Initialization
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(stream => { 
            video.srcObject = stream; 
            status.innerText = "Camera Connected.";
        })
        .catch(err => { status.innerText = "Camera Error: " + err.message; });

        // 2. Scan and Save Test
        document.getElementById('btn').onclick = () => {
            try {
                // Attempt to save a simple test string to prove LocalStorage works
                localStorage.setItem('testKey', 'Test Success!');
                
                // Verify the save
                const check = localStorage.getItem('testKey');
                if(check === 'Test Success!') {
                    status.innerText = "Success: Data Saved!";
                    alert("Scan & Save Worked!");
                } else {
                    status.innerText = "Error: Storage failed to read.";
                }
            } catch (e) {
                status.innerText = "Storage Crash: " + e.message;
            }
        };
    </script>
</body>
</html>
