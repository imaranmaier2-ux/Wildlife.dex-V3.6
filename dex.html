<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>W.G. JONES // TACTILE CAM PRO</title>
    <style>
        /* BASE RESET */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100vw; height: 100vh; background: #000; overflow: hidden; }

        /* THE CAMERA BODY: Rigid grid layout */
        .app-shell {
            display: grid;
            grid-template-columns: 100px 1fr 100px;
            width: 100vw; height: 100vh;
        }

        /* MECHANICAL SIDE PANELS */
        .panel { background: #121110; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 1px solid #222; }

        /* VIEWPORT: The container that holds the video */
        .viewport-container { 
            position: relative; 
            width: 100%; height: 100%; 
            background: #000;
            padding: 10px;
        }

        .viewport-inner {
            width: 100%; height: 100%;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            background: #000;
        }

        /* THE VIDEO FEED: The key fix for "squishing" */
        #live-video {
            position: absolute;
            top: 50%; left: 50%;
            width: 100%; height: 100%;
            object-fit: cover; /* This forces the camera to crop rather than stretch */
            transform: translate(-50%, -50%);
        }

        /* INTERFACE BUTTONS */
        .shutter-btn { width: 70px; height: 70px; background: #ff3b30; border-radius: 50%; border: none; cursor: pointer; }
        .gallery-btn { width: 50px; height: 50px; background: #333; color: #fff; border-radius: 50%; border: none; }

        /* GALLERY OVERLAY */
        #gallery-layer { position: fixed; inset: 0; background: #000; z-index: 100; display: none; padding: 20px; color: white; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .grid img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="gallery-layer">
        <button onclick="document.getElementById('gallery-layer').style.display='none'" style="padding:10px;">X CLOSE</button>
        <div class="grid" id="gallery-grid"></div>
    </div>

    <div class="app-shell">
        <div class="panel">
            <button class="gallery-btn" onclick="document.getElementById('gallery-layer').style.display='block'">📁</button>
        </div>
        <div class="viewport-container">
            <div class="viewport-inner">
                <video id="live-video" autoplay playsinline muted></video>
            </div>
        </div>
        <div class="panel">
            <button class="shutter-btn" id="shutter"></button>
        </div>
    </div>

    <script>
        const video = document.getElementById('live-video');
        const grid = document.getElementById('gallery-grid');
        let data = JSON.parse(localStorage.getItem('shots')) || [];

        // Correctly handle camera stream
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(s => video.srcObject = s);

        document.getElementById('shutter').addEventListener('click', () => {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            data.push(canvas.toDataURL());
            localStorage.setItem('shots', JSON.stringify(data));
            render();
        });

        function render() {
            grid.innerHTML = data.map(i => `<img src="${i}">`).join('');
        }
        render();
    </script>
</body>
</html>
