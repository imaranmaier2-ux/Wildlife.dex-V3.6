<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WILDLIFE DEX // OMNI-SCANNER</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@latest"></script>

    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100dvh; 
            background-color: #121110; color: #fff; 
            font-family: 'Courier New', Courier, monospace; 
            overflow: hidden; 
        }

        /* HARDWARE CAMERA LAYER - Absolutely positioned to prevent layout breaks */
        #camera-feed { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: cover; z-index: 1; 
        }

        /* TACTILE UI OVERLAY LAYER */
        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 10; pointer-events: none; 
            display: flex; flex-direction: column; justify-content: space-between;
        }

        /* TOP HUD */
        .hud-top {
            padding: 20px;
            display: flex; justify-content: space-between; align-items: flex-start;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
        }
        .status-box {
            background: rgba(18, 17, 16, 0.8); border: 1px solid #d7be9f;
            padding: 8px 12px; border-radius: 6px; font-weight: bold; font-size: 12px;
            color: #d7be9f; text-transform: uppercase; letter-spacing: 1px;
            backdrop-filter: blur(4px);
        }
        #ai-status { color: #ffca28; }

        /* CENTER VIEWFINDER CROSSHAIRS */
        .crosshair-container {
            flex-grow: 1; display: flex; justify-content: center; align-items: center;
        }
        .crosshair {
            width: 200px; height: 200px;
            border: 2px dashed rgba(215, 190, 159, 0.5);
            position: relative;
        }
        .crosshair::before, .crosshair::after {
            content: ''; position: absolute; background: #ff3b30;
        }
        .crosshair::before { top: 50%; left: 45%; right: 45%; height: 2px; transform: translateY(-50%); }
        .crosshair::after { left: 50%; top: 45%; bottom: 45%; width: 2px; transform: translateX(-50%); }

        /* BOTTOM HUD & SHUTTER */
        .hud-bottom {
            padding: 30px 20px;
            background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, transparent 100%);
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }
        .shutter-btn {
            pointer-events: auto; /* Allows clicking through the UI layer */
            width: 86px; height: 86px;
            background-color: #ff3b30; border: 6px solid #e5e5ea;
            border-radius: 50%; cursor: pointer;
            box-shadow: 0 8px 16px rgba(0,0,0,0.6), inset 0 -4px 8px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }
        .shutter-btn:active { transform: scale(0.92); }
        .shutter-btn:disabled { background-color: #555; border-color: #777; cursor: not-allowed; }

        /* RESULT CARD OVERLAY */
        .result-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(18, 17, 16, 0.95); z-index: 20;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px; pointer-events: auto;
        }
        .tactile-card {
            background: #d7be9f; width: 100%; max-width: 400px;
            border-radius: 12px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .card-image-container {
            width: 100%; height: 250px; background: #000;
            border-bottom: 4px solid #121110;
        }
        #snapshot-canvas { width: 100%; height: 100%; object-fit: cover; }
        .card-data { padding: 20px; color: #121110; }
        .card-header { font-size: 12px; font-weight: bold; color: #ff3b30; letter-spacing: 2px; margin-bottom: 5px; }
        #result-title { font-size: 24px; font-weight: 900; margin: 0 0 10px 0; font-family: sans-serif; text-transform: uppercase;}
        #result-confidence { font-size: 14px; font-weight: bold; opacity: 0.8; }
        
        .btn-close {
            margin-top: 20px; width: 100%; padding: 15px;
            background: #121110; color: #d7be9f; border: none;
            font-size: 16px; font-weight: bold; letter-spacing: 1px;
            border-radius: 8px; cursor: pointer;
        }
    </style>
</head>
<body>

    <video id="camera-feed" autoplay playsinline muted></video>

    <div class="ui-layer">
        <div class="hud-top">
            <div class="status-box">CAM: <span style="color:#4cd964">ON</span></div>
            <div class="status-box">AI: <span id="ai-status">LOADING MODEL...</span></div>
        </div>
        
        <div class="crosshair-container">
            <div class="crosshair"></div>
        </div>

        <div class="hud-bottom">
            <button class="shutter-btn" id="btn-scan" disabled></button>
        </div>
    </div>

    <div class="result-overlay" id="result-screen">
        <div class="tactile-card">
            <div class="card-image-container">
                <canvas id="snapshot-canvas"></canvas>
            </div>
            <div class="card-data">
                <div class="card-header">IDENTIFICATION MATCH</div>
                <h1 id="result-title">ANALYZING...</h1>
                <div id="result-confidence">Confidence: --%</div>
            </div>
        </div>
        <button class="btn-close" id="btn-resume">RESUME SCANNING</button>
    </div>

    <script>
        const video = document.getElementById('camera-feed');
        const btnScan = document.getElementById('btn-scan');
        const aiStatus = document.getElementById('ai-status');
        const resultScreen = document.getElementById('result-screen');
        const canvas = document.getElementById('snapshot-canvas');
        const ctx = canvas.getContext('2d');
        
        let aiModel = null;

        // 1. Initialize the Camera
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: false 
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Camera access denied or hardware error.");
            }
        }

        // 2. Load the AI Model
        async function loadAI() {
            try {
                // Loads the lightweight MobileNet model
                aiModel = await mobilenet.load();
                aiStatus.innerText = "READY";
                aiStatus.style.color = "#4cd964";
                btnScan.disabled = false; // Enable shutter button
            } catch (err) {
                aiStatus.innerText = "MODEL ERROR";
                aiStatus.style.color = "#ff3b30";
            }
        }

        // 3. Handle the Scan Interaction
        btnScan.addEventListener('click', async () => {
            if (!aiModel) return;

            // Show UI immediately
            resultScreen.style.display = 'flex';
            document.getElementById('result-title').innerText = "ANALYZING...";
            document.getElementById('result-confidence').innerText = "Processing visual data...";

            // Freeze a frame onto the canvas for the polaroid effect
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Run the AI Prediction on the live video element
            try {
                const predictions = await aiModel.classify(video);
                
                if (predictions && predictions.length > 0) {
                    // MobileNet returns multiple guesses. We take the top one.
                    const topResult = predictions[0];
                    
                    // Update UI with the item name and how confident the AI is
                    document.getElementById('result-title').innerText = topResult.className.split(',')[0];
                    const percentage = Math.round(topResult.probability * 100);
                    document.getElementById('result-confidence').innerText = `Confidence: ${percentage}%`;
                }
            } catch (error) {
                document.getElementById('result-title').innerText = "SCAN FAILED";
                document.getElementById('result-confidence').innerText = "Please try again.";
            }
        });

        // 4. Close Result Screen
        document.getElementById('btn-resume').addEventListener('click', () => {
            resultScreen.style.display = 'none';
        });

        // Boot up the system
        startCamera();
        loadAI();
    </script>
</body>
</html>
