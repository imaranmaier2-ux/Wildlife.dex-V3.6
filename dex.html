<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>W.G. JONES // PRO-DEX</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { width: 100vw; height: 100vh; background: #d2b48c; overflow: hidden; display: flex; justify-content: center; align-items: center; }

        /* The Main Body Frame */
        .camera-body {
            display: grid;
            grid-template-columns: 100px 1fr 100px;
            gap: 20px;
            width: 95vw; height: 85vh;
            padding: 20px;
            background: #e6cba9;
            border-radius: 40px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
        }

        /* Viewport Styling */
        .viewport-wrapper {
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            border: 8px solid #c4a984;
        }

        #live-video {
            width: 100%; height: 100%;
            object-fit: cover; /* Locks aspect ratio */
        }

        /* Buttons & Dials */
        .control-panel { display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .dial { width: 80px; height: 80px; background: #bba689; border-radius: 50%; box-shadow: 0 4px 0 #9e8b70; }
        .red-button { width: 100px; height: 100px; background: #ff3e3e; border-radius: 50%; border: none; cursor: pointer; }
        .btn-small { width: 50px; height: 50px; border-radius: 15px; border: none; background: #c4a984; }

        /* Pokedex Gallery Overlay */
        #gallery-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #d2b48c; z-index: 999; display: none; padding: 40px;
        }
        .polaroid { background: white; padding: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); transform: rotate(-2deg); }
        .polaroid img { width: 200px; height: 200px; object-fit: cover; }
    </style>
</head>
<body>

    <div id="gallery-overlay">
        <button onclick="this.parentElement.style.display='none'">EXIT DEX</button>
        <div id="gallery-grid" style="display:flex; gap:20px; flex-wrap:wrap; margin-top:30px;"></div>
    </div>

    <div class="camera-body">
        <div class="control-panel">
            <div class="dial"></div>
            <button class="btn-small" onclick="document.getElementById('gallery-overlay').style.display='block'">📁</button>
        </div>

        <div class="viewport-wrapper">
            <video id="live-video" autoplay playsinline muted></video>
        </div>

        <div class="control-panel">
            <div class="dial"></div>
            <button class="red-button" id="shutter"></button>
        </div>
    </div>

    <script>
        const video = document.getElementById('live-video');
        let gallery = JSON.parse(localStorage.getItem('pokedex_data')) || [];

        // Camera feed
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(s => video.srcObject = s);

        // Capture Logic (Polaroid Creation)
        document.getElementById('shutter').addEventListener('click', () => {
            const canvas = document.createElement('canvas');
            canvas.width = 300; canvas.height = 300;
            canvas.getContext('2d').drawImage(video, 0, 0, 300, 300);
            
            const polaroid = { img: canvas.toDataURL('image/png'), date: new Date().toLocaleDateString() };
            gallery.push(polaroid);
            localStorage.setItem('pokedex_data', JSON.stringify(gallery));
            renderGallery();
        });

        function renderGallery() {
            document.getElementById('gallery-grid').innerHTML = gallery.map(item => `
                <div class="polaroid">
                    <img src="${item.img}">
                    <p style="color:black; font-family:monospace;">ID: ${item.date}</p>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
