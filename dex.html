<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dex Telemetry View</title>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; text-align: center; }
        #camera-view { background: #000; border: 2px solid #333; margin: 10px auto; display: block; }
        .controls { margin-top: 15px; }
        input { padding: 8px; border-radius: 4px; border: 1px solid #555; }
        button { padding: 8px 15px; background: #007BFF; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <h1>System Dex View</h1>
    
    <canvas id="camera-view" width="400" height="300"></canvas>
    
    <h3 id="detection-status-text">Detected: Waiting for stream...</h3>

    <div class="controls">
        <input type="text" id="manual-override-input" placeholder="Type correct name (e.g., screw)">
        <button id="btn-submit-override">Save Override</button>
    </div>

    <script>
        // Connect UI elements to code variables
        const cameraView = document.getElementById('camera-view'); 
        const manualInput = document.getElementById('manual-override-input'); 
        const submitOverrideBtn = document.getElementById('btn-submit-override'); 
        const systemStatusDisplay = document.getElementById('detection-status-text'); 
        const ctx = cameraView.getContext('2d');

        // Draw a placeholder block into the canvas view if you aren't streaming real hardware video yet
        ctx.fillStyle = "#222";
        ctx.fillRect(0, 0, cameraView.width, cameraView.height);

        /**
         * Compresses the current image canvas frame down into raw file format data
         */
        function getFrameBlob() {
            return new Promise((resolve) => {
                cameraView.toBlob((blob) => { resolve(blob); }, 'image/jpeg', 0.85);
            });
        }

        /**
         * Automated background loop that pings the server with your feed frame
         */
        async function performLiveScan() {
            const imageBlob = await getFrameBlob();
            const formData = new FormData();
            formData.append('image', imageBlob, 'frame.jpg');

            try {
                const response = await fetch('/api/scan', { method: 'POST', body: formData });
                const data = await response.json();

                // If the backend says this matches your saved item vector, paint it bright green
                if (data.is_override) {
                    systemStatusDisplay.innerText = `Matched: ${data.prediction} (Manual Lock-on)`;
                    systemStatusDisplay.style.color = "#00FF00";
                } else {
                    systemStatusDisplay.innerText = `Detected: ${data.prediction}`;
                    systemStatusDisplay.style.color = "#FFFFFF";
                }
            } catch (err) {
                console.error("Scanning synchronization connection error:", err);
            }
        }

        /**
         * Code block that executes when you click the 'Save Override' UI button
         */
        submitOverrideBtn.addEventListener('click', async () => {
            const customLabel = manualInput.value.trim();
            if (!customLabel) return alert("Please type a valid item descriptor name first!");

            const imageBlob = await getFrameBlob();
            const formData = new FormData();
            formData.append('image', imageBlob, 'override_frame.jpg');
            formData.append('label', customLabel);

            systemStatusDisplay.innerText = "Locking signature parameters into memory bank...";

            try {
                const response = await fetch('/api/override', { method: 'POST', body: formData });
                const data = await response.json();
                
                if (data.status === "success") {
                    manualInput.value = ""; // Clear input slot
                    alert(data.message); // Displays verification popup confirmation
                }
            } catch (err) {
                console.error("Failed to commit override data payload:", err);
            }
        });

        // Starts scanning the viewport every 500 milliseconds automatically
        setInterval(performLiveScan, 500);
    </script>
</body>
</html>
