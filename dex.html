<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NOT BORING // TACTILE CAM CAM PRO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #121110;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* Landscape Orientation Warning Guide */
        .orientation-shield {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #121110;
            color: #d7be9f;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            text-align: center;
            padding: 20px;
        }

        .rotation-icon {
            font-size: 48px;
            margin-bottom: 15px;
            animation: spin 2s infinite linear;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 50% { transform: rotate(-90deg); } 100% { transform: rotate(0deg); } }

        .bypass-btn {
            margin-top: 25px;
            padding: 10px 20px;
            background: #242221;
            border: 1px solid #d7be9f;
            color: #d7be9f;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Master Edge-to-Edge Fluid Camera Interface Framework */
        .camera-container {
            width: 100vw;
            height: 100vh;
            background-color: #d7be9f;
            display: grid;
            grid-template-columns: 140px 1fr 140px;
            padding: 10px;
            position: relative;
        }

        /* --- LEFT MECHANICAL PANEL --- */
        .panel-left {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
        }

        .sunken-tray-horizontal {
            background-color: #beaa91;
            width: 110px; height: 42px;
            border-radius: 21px;
            box-shadow: inset 2px 3px 6px rgba(0,0,0,0.3);
            position: relative;
            display: flex;
            align-items: center;
        }

        .black-knob-slider {
            width: 36px; height: 36px;
            background-color: #242221;
            border-radius: 50%;
            box-shadow: 2px 3px 6px rgba(0,0,0,0.5);
            position: absolute;
            left: 3px;
            transition: left 0.2s ease;
        }

        .sunken-tray-vertical-barrel {
            background-color: #beaa91;
            width: 110px;
            height: 165px;
            border-radius: 24px;
            box-shadow: inset 3px 4px 8px rgba(0,0,0,0.4);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            touch-action: none;
        }

        .vertical-barrel-roller {
            width: 94px;
            height: 150px;
            border-radius: 16px;
            background: repeating-linear-gradient(0deg, #c5c5c5 0px, #c5c5c5 12px, #ffffff 12px, #ffffff 14px, #a3a3a3 14px, #a3a3a3 20px);
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }

        .dual-buttons-row {
            display: flex;
            gap: 10px;
        }

        .matte-round-btn {
            width: 50px; height: 50px;
            background-color: #242221;
            border: none; border-radius: 50%;
            color: #ffffff; font-size: 15px; font-weight: bold;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            box-shadow: 2px 4px 8px rgba(0,0,0,0.4), inset 0px 1px 1px #666;
        }
        .matte-round-btn:active { box-shadow: inset 2px 3px 5px rgba(0,0,0,0.6); }

        /* --- CENTER PANEL (REAL DIGITAL VIEWFINDER) --- */
        .panel-center {
            position: relative;
            width: 100%; height: 100%;
            padding: 2px;
        }

        .viewfinder-viewport {
            width: 100%; height: 100%;
            background-color: #000000;
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0px 0px 20px rgba(0,0,0,0.8);
        }

        #embedded-live-video {
            width: 100%; height: 100%;
            object-fit: cover;
            transform-origin: center center;
            transition: transform 0.1s ease, filter 0.3s ease;
        }

        .hud-center-stats {
            position: absolute;
            top: 15px; left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #ffffff;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.7);
            pointer-events: none;
        }

        .hud-ticks { font-size: 14px; letter-spacing: 5px; opacity: 0.6; margin-bottom: 2px; }
        .hud-label { font-size: 10px; font-weight: bold; letter-spacing: 2px; opacity: 0.8; }
        .hud-main-value { font-size: 26px; font-weight: 900; margin-top: 1px; }

        .hud-bottom-bar {
            position: absolute;
            bottom: 12px; left: 15px; right: 15px;
            display: flex; justify-content: space-between; align-items: center;
            pointer-events: none;
        }

        .hud-pill-box {
            background: rgba(0, 0, 0, 0.45);
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 11px; font-weight: bold; color: white;
            backdrop-filter: blur(5px);
        }

        .hud-inline-metrics {
            display: flex; gap: 15px;
            font-size: 11px; font-weight: bold; color: white;
        }

        .manual-keyboard-override {
            width: calc(100% - 30px);
            position: absolute;
            bottom: 55px; left: 15px;
            background: rgba(18,17,16,0.95);
            border: 1px dashed #555; border-radius: 8px;
            color: #fff; padding: 10px; text-align: center;
            font-size: 11px; letter-spacing: 1px;
            display: none; z-index: 10;
        }

        /* --- RIGHT MECHANICAL PANEL --- */
        .panel-right {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
        }

        .sunken-tray-horizontal-barrel {
            background-color: #beaa91;
            width: 115px; height: 48px;
            border-radius: 14px;
            box-shadow: inset 2px 3px 6px rgba(0,0,0,0.4);
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            touch-action: none;
        }

        .horizontal-barrel-roller {
            width: 102px; height: 38px;
            border-radius: 8px;
            background: repeating-linear-gradient(90deg, #c5c5c5 0px, #c5c5c5 10px, #ffffff 10px, #ffffff 12px, #a3a3a3 12px, #a3a3a3 16px);
            box-shadow: 0px 3px 6px rgba(0,0,0,0.3);
        }

        .giant-shutter-red {
            width: 110px; height: 110px;
            background-color: #ff3b30;
            border: none; border-radius: 50%;
            cursor: pointer;
            box-shadow: inset 1px 2px 3px rgba(255,255,255,0.4), 0px 6px 12px rgba(0,0,0,0.45);
            display: flex; justify-content: center; align-items: center;
            transition: transform 0.05s ease;
        }
        .giant-shutter-red:active { transform: scale(0.95); }

        .shutter-cross-icon {
            width: 28px; height: 4px; background-color: #ffffff; position: relative;
        }
        .shutter-cross-icon::before {
            content: ""; width: 4px; height: 28px; background-color: #ffffff;
            position: absolute; top: -12px; left: 12px;
        }

        .right-lower-combo {
            display: flex; align-items: center; gap: 8px; width: 120px; justify-content: flex-end;
        }
        .dots-track { display: flex; gap: 4px; }
        .dot { width: 5px; height: 5px; background-color: #8b7761; border-radius: 50%; }
        .dot.active { background-color: #ffffff; }

        /* --- DYNAMIC TELEMETRY POPUP AND TRUE PHOTO CAPTURE PREVIEW --- */
        .hud-telemetry-overlay-card {
            position: absolute;
            top: 10px; bottom: 10px; left: 10px; right: 10px;
            background-color: rgba(18, 17, 16, 0.98);
            border-radius: 18px;
            padding: 15px;
            display: none;
            grid-template-columns: 180px 1fr;
            gap: 15px;
            z-index: 100;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.8);
        }

        .captured-polaroid-frame {
            width: 100%; height: 100%;
            background-color: #f4f1eb;
            padding: 8px 8px 30px 8px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.5);
            display: flex; flex-direction: column;
        }

        #canvas-snapshot-output {
            width: 100%; height: 100%;
            object-fit: cover;
            border: 1px solid #ddd;
            background-color: #222;
        }

        .card-info-pane {
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .card-header { font-size: 10px; color: #ff3b30; font-weight: bold; letter-spacing: 2px; }
        .card-title { font-size: 22px; font-weight: 900; color: #fff; margin: 2px 0; }
        .card-sub { font-size: 12px; color: #beaa91; font-style: italic; margin-bottom: 6px; }
        .card-body { font-size: 12px; color: #e5e5ea; line-height: 1.4; overflow-y: auto; max-height: 110px; }
        
        .card-actions { display: flex; gap: 8px; margin-top: 5px; }
        .action-btn {
            flex: 1; padding: 10px; border-radius: 6px; border: none;
            font-weight: bold; font-size: 11px; cursor: pointer; text-transform: uppercase;
        }
        .btn-save { background-color: #ffffff; color: #000; }
        .btn-reset { background-color: #333; color: #fff; }
    </style>
</head>
<body>

    <!-- Instruction Screen with Manual Force Button -->
    <div class="orientation-shield" id="shield">
        <div class="rotation-icon">📱</div>
        <h2>Please Flip Your Phone Sideways</h2>
        <p>This camera framework runs exclusively in immersive Landscape orientation.</p>
        <button class="bypass-btn" onclick="forceUnlockCamera()">Force Open App Anyway</button>
    </div>

    <!-- Active Device Frame Container Grid -->
    <div class="camera-container">
        
        <!-- LEFT CONTROL GROUP COLUMN -->
        <div class="panel-left">
            <div class="sunken-tray-horizontal">
                <div class="black-knob-slider" id="knob-left"></div>
            </div>

            <div class="sunken-tray-vertical-barrel" id="zoom-roller-wheel">
                <div class="vertical-barrel-roller" id="zoom-barrel-graphic"></div>
            </div>

            <div class="dual-buttons-row">
                <button class="matte-round-btn" id="btn-filters">🎛️</button>
                <button class="matte-round-btn" id="btn-mode-m">M</button>
            </div>
        </div>

        <!-- CENTER PANEL (LIVE VIEWPORT ENGINE) -->
        <div class="panel-center">
            <div class="viewfinder-viewport">
                <video id="embedded-live-video" autoplay playsinline muted></video>

                <div class="hud-center-stats">
                    <div class="hud-ticks">▪ ▪ ▪ ▪ ▪ <span style="color:#ff3b30;">▪</span> ▪ ▪ ▪ ▪</div>
                    <div class="hud-label" id="hud-stat-label">SHUTTER SPEED</div>
                    <div class="hud-main-value" id="hud-stat-value">1/210</div>
                </div>

                <div class="hud-bottom-bar">
                    <div class="hud-pill-box" id="hud-lower-pill">♦ 1/210</div>
                    <div class="hud-inline-metrics">
                        <div>⚏ 18</div>
                        <div>☀ 5440K</div>
                        <div style="color:#ff3b30;">📊||ı|</div>
                    </div>
                </div>

                <input type="text" id="manual-text-input" class="manual-keyboard-override" placeholder="[ ENTER SIMULATOR TARGET VALUE OVERRIDE ]">

                <div class="hud-telemetry-overlay-card" id="result-overlay">
                    <div class="captured-polaroid-frame">
                        <canvas id="canvas-snapshot-output"></canvas>
                    </div>
                    <div class="card-info-pane">
                        <div>
                            <div class="card-header">Hardware Capture Diagnostics</div>
                            <div class="card-title" id="res-name">Specimen Active</div>
                            <div class="card-sub" id="res-science">Taxonomy Branch</div>
                            <div class="card-body" id="res-fact">Processing frame analysis data loops...</div>
                        </div>
                        <div class="card-actions">
                            <button class="action-btn btn-save" id="btn-log-dex">＋ Register Entry</button>
                            <button class="action-btn btn-reset" id="btn-close-card">✖ Resume Stream</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- RIGHT CONTROL GROUP COLUMN -->
        <div class="panel-right">
            <div class="sunken-tray-horizontal-barrel" id="stat-roller-wheel">
                <div class="horizontal-barrel-roller" id="stat-barrel-graphic"></div>
            </div>

            <button class="giant-shutter-red" id="shutter-trigger">
                <div class="shutter-cross-icon"></div>
            </button>

            <div class="right-lower-combo">
                <div class="dots-track">
                    <div class="dot active" id="dot-f0"></div>
                    <div class="dot" id="dot-f1"></div>
                    <div class="dot" id="dot-f2"></div>
                    <div class="dot" id="dot-f3"></div>
                </div>
                <button class="matte-round-btn" id="btn-filter-toggle">⌌%</button>
            </div>
        </div>

    </div>

    <script>
        const video = document.getElementById('embedded-live-video');
        const shield = document.getElementById('shield');
        const zoomWheel = document.getElementById('zoom-roller-wheel');
        const zoomGraphic = document.getElementById('zoom-barrel-graphic');
        const statWheel = document.getElementById('stat-roller-wheel');
        const statGraphic = document.getElementById('stat-barrel-graphic');
        
        // --- LIVE DYNAMIC WINDOW ORIENTATION MONITORING ---
        function checkLayoutDimensions() {
            if (window.innerWidth > window.innerHeight) {
                shield.style.display = 'none'; // Width is larger than height, successfully sideways!
            } else {
                shield.style.display = 'flex';
            }
        }
        
        window.addEventListener('resize', checkLayoutDimensions);
        window.addEventListener('orientationchange', checkLayoutDimensions);
        window.addEventListener('load', checkLayoutDimensions);

        function forceUnlockCamera() {
            shield.style.display = 'none';
            bootUpCameraLens();
        }

        // --- CAMERA STREAM HARDWARE INITIALIZATION ---
        function bootUpCameraLens() {
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }, 
                    audio: false 
                })
                .then(stream => { video.srcObject = stream; })
                .catch(() => { console.log("Awaiting camera confirmation switch."); });
            }
        }
        bootUpCameraLens();

        // --- DIALS GESTURE TRACKING CONTROLS ---
        let currentZoom = 1;
        let zoomRotation = 0;
        let startY = 0;

        zoomWheel.addEventListener('touchstart', e => { startY = e.touches[0].clientY; });
        zoomWheel.addEventListener('touchmove', e => {
            let deltaY = e.touches[0].clientY - startY;
            if (Math.abs(deltaY) > 5) {
                zoomRotation += deltaY * 0.4;
                zoomGraphic.style.transform = `rotateX(${zoomRotation}deg)`;
                startY = e.touches[0].clientY;
                
                currentZoom += deltaY > 0 ? -0.1 : 0.1;
                currentZoom = Math.max(1, Math.min(6, currentZoom));
                video.style.transform = `scale(${currentZoom.toFixed(1)})`;
                document.getElementById('hud-lower-pill').innerText = `♦ ZOOM ${currentZoom.toFixed(1)}X`;
            }
        });

        zoomWheel.addEventListener('click', () => {
            zoomRotation += 40;
            zoomGraphic.style.transform = `rotateX(${zoomRotation}deg)`;
            currentZoom = currentZoom >= 5 ? 1 : currentZoom + 1;
            video.style.transform = `scale(${currentZoom})`;
            document.getElementById('hud-lower-pill').innerText = `♦ ZOOM ${currentZoom}X`;
        });

        let currentStatIndex = 0;
        let startX = 0;
        statWheel.addEventListener('touchstart', e => { startX = e.touches[0].clientX; });
        statWheel.addEventListener('touchmove', e => {
            let deltaX = e.touches[0].clientX - startX;
            if (Math.abs(deltaX) > 15) {
                currentStatIndex = (currentStatIndex + 1) % 3;
                updateStatsDisplay();
                startX = e.touches[0].clientX;
            }
        });
        statWheel.addEventListener('click', () => {
            currentStatIndex = (currentStatIndex + 1) % 3;
            updateStatsDisplay();
        });

        function updateStatsDisplay() {
            const labels = ["SHUTTER SPEED", "EXPOSURE VALUE", "ISO OPTICS"];
            const values = ["1/210", "EV -0.7", "ISO 64"];
            document.getElementById('hud-stat-label').innerText = labels[currentStatIndex];
            document.getElementById('hud-stat-value').innerText = values[currentStatIndex];
            
            let currentAngle = currentStatIndex * 60;
            statGraphic.style.transform = `rotateY(${currentAngle}deg)`;
        }

        // --- FILTER CYCLE CONTROLS ---
        let currentFilter = 0;
        const filterModes = ["none", "grayscale(1) contrast(1.7)", "hue-rotate(90deg) brightness(1.3) contrast(1.2)", "invert(1) hue-rotate(180deg)"];
        
        function cycleFilters() {
            currentFilter = (currentFilter + 1) % 4;
            video.style.filter = filterModes[currentFilter];
            document.querySelectorAll('.dot').forEach((d, idx) => {
                d.classList.toggle('active', idx === currentFilter);
            });
        }
        document.getElementById('btn-filters').addEventListener('click', cycleFilters);
        document.getElementById('btn-filter-toggle').addEventListener('click', cycleFilters);

        // --- MANUAL OVERRIDE KEYBOARD KNOB ---
        let isModeActive = false;
        document.getElementById('btn-mode-m').addEventListener('click', () => {
            isModeActive = !isModeActive;
            document.getElementById('knob-left').style.left = isModeActive ? "71px" : "3px";
            document.getElementById('manual-text-input').style.display = isModeActive ? "block" : "none";
            if (isModeActive) document.getElementById('manual-text-input').focus();
        });

        // --- PICTURE TAKING LOGIC GRAPHICS ENGINE ---
        document.getElementById('shutter-trigger').addEventListener('click', () => {
            const canvas = document.getElementById('canvas-snapshot-output');
            const ctx = canvas.getContext('2d');
            
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.scale(currentZoom, currentZoom);
            ctx.translate(-canvas.width / 2, -canvas.height / 2);
            
            ctx.filter = getComputedStyle(video).filter;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            ctx.restore();

            const rawIn = document.getElementById('manual-text-input').value.toLowerCase().trim();
            parseTargetTelemetry(rawIn);
            
            document.getElementById('result-overlay').style.display = "grid";
        });

        function parseTargetTelemetry(query) {
            let title = "White-Tailed Deer 🦊";
            let science = "Odocoileus virginianus";
            let desc = "Common highly alert native Texas forest herbivore. Caught via custom live image digital viewport processing engines.";

            if (query.includes("woodpecker")) {
                title = "Pileated Woodpecker 🐦"; science = "Dryocopus pileatus";
                desc = "Massive forest woodpecker with a brilliant fire-crimson crest cap. Excavatess large structural timber cavities.";
            } else if (query.includes("snake") || query.includes("cottonmouth")) {
                title = "Western Cottonmouth 🐍"; science = "Agkistrodon piscivorus";
                desc = "Venomous semi-aquatic pit viper. Exposes a distinct snow-white mouth interior flash frame when tracking local targets.";
            } else if (query.includes("bass")) {
                title = "Largemouth Bass 🐟"; science = "Micropterus salmoides";
                desc = "Aggressive apex fresh-water game fish native to shallow Texas creek logs and lily pads.";
            }

            document.getElementById('res-name').innerText = title;
            document.getElementById('res-science').innerText = science;
            document.getElementById('res-fact').innerText = desc;
        }

        document.getElementById('btn-close-card').addEventListener('click', () => {
            document.getElementById('result-overlay').style.display = "none";
        });

        document.getElementById('btn-log-dex').addEventListener('click', () => {
            alert("Picture file data saved inside catalog storage arrays!");
        });
    </script>
</body>
</html>
