<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>W.G. JONES // PRO-DEX</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { width: 100vw; height: 100vh; background: #d2b48c; overflow: hidden; display: flex; justify-content: center; align-items: center; }

        /* THE CAMERA BODY - FORCED LANDSCAPE */
        .camera-body {
            display: flex;
            width: 95vw; height: 80vh;
            background: #e6cba9;
            border-radius: 40px;
            padding: 20px;
            gap: 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
            /* This ensures it stays a horizontal block */
            flex-direction: row; 
        }

        /* SIDEBARS */
        .sidebar { width: 100px; display: flex; flex-direction: column; justify-content: space-between; align-items: center; }

        /* VIEWPORT - FORCED TO EXPAND */
        .viewport-wrapper {
            flex-grow: 1; /* This makes the middle take all space */
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 8px solid #c4a984;
            display: flex;
        }

        #live-video {
            width: 100%; height: 100%;
            object-fit: cover; /* Prevents squishing */
        }

        /* UI ELEMENTS */
        .red-button { width: 80px; height: 80px; background: #ff3e3e; border-radius: 50%; border: none; cursor: pointer; }
        .btn-small { width: 50px; height: 50px; border-radius: 15px; border: none; background: #c4a984; }
    </style>
</head>
<body>

    <div class="camera-body">
        <div class="sidebar">
            <button class="btn-small" onclick="alert('Open Dex')">📁</button>
        </div>

        <div class="viewport-wrapper">
            <video id="live-video" autoplay playsinline muted></video>
        </div>

        <div class="sidebar">
            <button class="red-button" id="shutter"></button>
        </div>
    </div>

    <script>
        const video = document.getElementById('live-video');
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(s => video.srcObject = s);
    </script>
</body>
</html>
