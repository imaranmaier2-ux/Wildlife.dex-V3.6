<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>W.G. JONES // PRO-DEX</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* 1. Pin the layout to the absolute screen bounds */
        body { 
            background: #d2b48c; 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 2. The Main Camera Body - Forces Horizontal layout */
        .camera-body {
            display: grid;
            grid-template-columns: 100px 1fr 100px;
            width: 95vw;
            height: 85vh;
            background: #e6cba9;
            border-radius: 40px;
            padding: 20px;
            gap: 20px;
            position: relative;
        }

        /* 3. The Viewport - Forced Square */
        .viewport-frame {
            background: #000;
            border-radius: 20px;
            border: 8px solid #c4a984;
            overflow: hidden;
            position: relative;
            /* Essential to stop the squish */
            aspect-ratio: 1 / 1;
        }

        #live-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* UI Elements */
        .sidebar { display: flex; flex-direction: column; justify-content: space-between; align-items: center; }
        .btn-round { width: 80px; height: 80px; background: #ff3b30; border-radius: 50%; }
        .btn-square { width: 50px; height: 50px; background: #c4a984; border-radius: 15px; }
    </style>
</head>
<body>

    <div class="camera-body">
        <div class="sidebar">
            <button class="btn-square">📁</button>
        </div>
        
        <div class="viewport-frame">
            <video id="live-feed" autoplay playsinline muted></video>
        </div>

        <div class="sidebar">
            <button class="btn-round" id="shutter"></button>
        </div>
    </div>

    <script>
        const video = document.getElementById('live-feed');
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(s => video.srcObject = s);
    </script>
</body>
</html>
