<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WILDLIFE DEX // SMART CAM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/knn-classifier@latest"></script>

    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100dvh; background-color: #121110; color: #fff; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        
        #camera-feed { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; }
        .hud-top { padding: 20px; display: flex; justify-content: space-between; align-items: flex-start; background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%); }
        .status-box { background: rgba(18, 17, 16, 0.8); border: 1px solid #d7be9f; padding: 8px 12px; border-radius: 6px; font-weight: bold; font-size: 11px; color: #d7be9f; text-transform: uppercase; letter-spacing: 1px; backdrop-filter: blur(4px); }
        
        .crosshair-container { flex-grow: 1; display: flex; justify-content: center; align-items: center; }
        .crosshair { width: 180px; height: 180px; border: 2px dashed rgba(215, 190, 159, 0.4); position: relative; }
        
        .hud-bottom { padding: 30px 20px; background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, transparent 100%); display: flex; justify-content: center; align-items: center; }
        .shutter-btn { pointer-events: auto; width: 80px; height: 80px; background-color: #ff3b30; border: 6px solid #e5e5ea; border-radius: 50%; cursor: pointer; box-shadow: 0 8px 16px rgba(0,0,0,0.6); }
        .shutter-btn:active { transform: scale(0.92); }

        .result-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(18, 17, 16, 0.95); z-index: 20; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 20px; pointer-events: auto; }
        .tactile-card { background: #d7be9f; width: 100%; max-width: 400px; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .card-image-container { width: 100%; height: 220px; background: #000; }
        #snapshot-canvas { width: 100%; height: 100%; object-fit: cover; }
        .card-data { padding: 20px; color: #121110; }
        .card-header { font-size: 11px; font-weight: bold; color: #ff3b30; letter-spacing: 2px; margin-bottom: 5px; }
        #result-title { font-size: 24px; font-weight: 900; margin: 0 0 10px 0; text-transform: uppercase; font-family: sans-serif; }
        #result-confidence { font-size: 13px; font-weight: bold; opacity: 0.8; }
        
        .action-container { width: 100%; max-width: 400px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { padding: 15px; border: none; font-size: 14px; font-weight: bold; border-radius: 8px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .btn-main { background: #4cd964; color: #121110; }
        .btn-override { background: #ffcc00; color: #121110; }
    </style>
</head>
<body>

    <video id="camera-feed" autoplay playsinline muted></video>

    <div class="ui-layer">
        <div class="hud-top">
            <div class="status-box">MEMORY: <span id="memory-count" style="color:#4cd964">0 CUSTOM</span></div>
            <div class="status-box">AI: <span id="ai-status" style="color:#ffcc00">LOADING...</span></div>
        </div>
        <div class="crosshair-container"><div class="crosshair"></div></div>
        <div class="hud-bottom"><button class="shutter-btn" id="btn-scan" disabled></button></div>
    </div>

    <div class="result-overlay" id="result-screen">
        <div class="tactile-card">
            <div class="card-image-container"><canvas id="snapshot-canvas"></canvas></div>
            <div class="card-data">
                <div class="card-header" id="match-type">STANDARD AI MATCH</div>
                <h1 id="result-title">ANALYZING...</h1>
                <div id="result-confidence">Confidence: --%</div>
            </div>
        </div>
        <div class="action-container">
            <button class="btn btn-override" id="btn-override">CORRECT AI</button>
            <button class="btn btn-main" id="btn-resume">RESUME</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('camera-feed');
        const btnScan = document.getElementById('btn-scan');
        const aiStatus = document.getElementById('ai-status');
        const resultScreen = document.getElementById('result-screen');
        const canvas = document.getElementById('snapshot-canvas');
        const ctx = canvas.getContext('2d');
        
        let model = null;
        let classifier = null;
        let lastActivation = null;

        // 1. Start Device Camera
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
                video.srcObject = stream;
            } catch (err) { alert("Camera error: " + err.message); }
        }

        // 2. Initialize Models & Load Saved Memory Bank
        async function loadModels() {
            try {
                model = await mobilenet.load();
                classifier = knnClassifier.create();
                
                // Load custom overrides from your phone's memory if they exist
                if (localStorage.getItem('dex_custom_memory')) {
                    const dataset = JSON.parse(localStorage.getItem('dex_custom_memory'));
                    Object.keys(dataset).forEach((key) => {
                        dataset[key] = tf.tensor2d(dataset[key]);
                    });
                    classifier.setClassifierDataset(dataset);
                    updateMemoryCount();
                }

                aiStatus.innerText = "ONLINE";
                aiStatus.style.color = "#4cd964";
                btnScan.disabled = false;
            } catch (err) {
                aiStatus.innerText = "ERROR";
            }
        }

        function updateMemoryCount() {
            const numClasses = classifier.getNumClasses();
            document.getElementById('memory-count').innerText = `${numClasses} OVERRIDES`;
        }

        // 3. Save Custom Memory Bank to Phone Storage
        function saveMemoryToDisk() {
            const dataset = classifier.getClassifierDataset();
            const datasetObj = {};
            Object.keys(dataset).forEach((key) => {
                datasetObj[key] = dataset[key].arraySync();
            });
            localStorage.setItem('dex_custom_memory', JSON.stringify(datasetObj));
            updateMemoryCount();
        }

        // 4. Capture & Classify
        btnScan.addEventListener('click', async () => {
            if (!model) return;

            resultScreen.style.display = 'flex';
            document.getElementById('result-title').innerText = "SCANNING...";

            canvas.width = 480; // Scaled down for rapid memory processing
            canvas.height = 480 * (video.videoHeight / video.videoWidth);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Get intermediate feature layer from MobileNet (the object "fingerprint")
            const infer = () => model.infer(video, true);
            const activation = infer();
            lastActivation = tf.keep(activation); // Keep in memory in case user hits override

            // Check our custom memory bank first
            if (classifier.getNumClasses() > 0) {
                const res = await classifier.predictClass(activation);
                if (res && res.confidence[res.label] > 0.65) { // 65% confidence threshold for custom memory
                    document.getElementById('match-type').innerText = "LEARNED MEMORY MATCH";
                    document.getElementById('result-title').innerText = res.label.toUpperCase();
                    document.getElementById('result-confidence').innerText = `Confidence: ${Math.round(res.confidence[res.label] * 100)}%`;
                    return;
                }
            }

            // Fallback to standard base AI model
            try {
                const predictions = await model.classify(video);
                if (predictions && predictions.length > 0) {
                    document.getElementById('match-type').innerText = "STANDARD AI MATCH";
                    document.getElementById('result-title').innerText = predictions[0].className.split(',')[0];
                    document.getElementById('result-confidence').innerText = `Confidence: ${Math.round(predictions[0].probability * 100)}%`;
                } else {
                    document.getElementById('result-title').innerText = "UNKNOWN OBJECT";
                }
            } catch (e) {
                document.getElementById('result-title').innerText = "SCAN ERROR";
            }
        });

        // 5. Manual Override Button Logic
        document.getElementById('btn-override').addEventListener('click', () => {
            if (!lastActivation) return;

            const correctName = prompt("What is the correct name of this object?");
            if (correctName && correctName.trim() !== "") {
                const cleanName = correctName.trim().toLowerCase();
                
                // Add the current image fingerprint to our custom memory bank under the new name
                classifier.addExample(lastActivation, cleanName);
                saveMemoryToDisk();

                // Update UI immediately
                document.getElementById('match-type').innerText = "NEW MEMORY RECORDEED!";
                document.getElementById('result-title').innerText = cleanName.toUpperCase();
                document.getElementById('result-confidence').innerText = "Confidence: 100% (Manual)";
            }
        });

        document.getElementById('btn-resume').addEventListener('click', () => {
            resultScreen.style.display = 'none';
            if (lastActivation) {
                lastActivation.dispose(); // Free graphics card memory
                lastActivation = null;
            }
        });

        startCamera();
        loadModels();
    </script>
</body>
</html>
