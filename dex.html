<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>DEX Camera</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: Arial, sans-serif;
  background: #2b2b2b;
  color: white;
  height: 100dvh;
  overflow: hidden;
}

.camera-shell {
  width: 100vw;
  height: 100dvh;
  display: grid;
  grid-template-columns: 80px 1fr 80px;
  grid-template-rows: 80px 1fr 120px;
  background: linear-gradient(145deg, #d7c3a2, #b89970);
  position: relative;
}

.top-bar {
  grid-column: 1 / 4;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 24px;
}

.dial {
  width: 54px;
  height: 54px;
  border-radius: 50%;
  background:
    repeating-conic-gradient(
      #666 0deg 6deg,
      #999 6deg 12deg
    );
  box-shadow: inset 0 3px 6px rgba(255,255,255,0.2);
}

.flash-light {
  width: 40px;
  height: 20px;
  background: #e8e8e8;
  border-radius: 5px;
}

.left-panel,
.right-panel {
  display: flex;
  justify-content: center;
  align-items: center;
}

.viewfinder {
  grid-column: 2;
  grid-row: 2;
  position: relative;
  overflow: hidden;
  border-radius: 20px;
  background: black;
  box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
}

video {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.hud {
  position: absolute;
  inset: 0;
  pointer-events: none;
  border: 2px solid rgba(255,255,255,0.4);
}

.bottom-bar {
  grid-column: 1 / 4;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 30px;
}

button {
  cursor: pointer;
  border: none;
}

.shutter {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  background: radial-gradient(circle, #ff4d4d, #b10000);
  box-shadow:
    inset 0 6px 12px rgba(255,255,255,.3),
    0 6px 14px rgba(0,0,0,.4);
}

button:active {
  transform: translateY(3px) scale(.97);
}

.gallery-btn {
  padding: 12px 20px;
  border-radius: 12px;
  background: #444;
  color: white;
}

.gallery {
  position: fixed;
  inset: 0;
  background: rgba(20,20,20,0.96);
  overflow-y: auto;
  padding: 20px;
  display: none;
  z-index: 999;
}

.gallery.show {
  display: block;
}

.gallery h2 {
  margin-bottom: 20px;
}

.close-gallery {
  margin-bottom: 20px;
  padding: 10px 20px;
  background: crimson;
  color: white;
  border-radius: 8px;
}

.dex-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(150px,1fr));
  gap: 18px;
}

.polaroid {
  background: #f4f0e7;
  padding: 10px;
  border-radius: 10px;
  color: black;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}

.polaroid img {
  width: 100%;
  aspect-ratio: 1/1.2;
  object-fit: cover;
}

.caption {
  margin-top: 8px;
  font-size: 12px;
  text-align: center;
}

.flash-overlay {
  position: fixed;
  inset: 0;
  background: white;
  opacity: 0;
  pointer-events: none;
}

.flash {
  animation: flashAnim .2s ease;
}

@keyframes flashAnim {
  from { opacity: 1; }
  to { opacity: 0; }
}
</style>
</head>

<body>

<div class="camera-shell">
  <div class="top-bar">
    <div class="dial"></div>
    <div class="flash-light"></div>
  </div>

  <div class="left-panel"></div>

  <div class="viewfinder">
    <video id="video" autoplay playsinline></video>
    <div class="hud"></div>
  </div>

  <div class="right-panel"></div>

  <div class="bottom-bar">
    <button class="gallery-btn" id="galleryBtn">DEX</button>
    <button class="shutter" id="captureBtn"></button>
  </div>
</div>

<div class="gallery" id="gallery">
  <button class="close-gallery" id="closeGallery">Close</button>
  <h2>DEX Gallery</h2>
  <div class="dex-grid" id="dexGrid"></div>
</div>

<div class="flash-overlay" id="flash"></div>

<canvas id="canvas" hidden></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const captureBtn = document.getElementById("captureBtn");
const gallery = document.getElementById("gallery");
const galleryBtn = document.getElementById("galleryBtn");
const closeGallery = document.getElementById("closeGallery");
const dexGrid = document.getElementById("dexGrid");
const flash = document.getElementById("flash");

async function initCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: "environment" },
        width: { ideal: 1920 },
        height: { ideal: 1080 }
      },
      audio: false
    });

    video.srcObject = stream;
  } catch (err) {
    alert("Camera access failed: " + err.message);
  }
}

function savePhoto(dataUrl) {
  const photos = JSON.parse(localStorage.getItem("dexPhotos") || "[]");
  photos.unshift({
    image: dataUrl,
    time: new Date().toLocaleString()
  });

  if (photos.length > 30) photos.pop();

  localStorage.setItem("dexPhotos", JSON.stringify(photos));
}

function renderGallery() {
  const photos = JSON.parse(localStorage.getItem("dexPhotos") || "[]");
  dexGrid.innerHTML = "";

  photos.forEach(photo => {
    const card = document.createElement("div");
    card.className = "polaroid";
    card.innerHTML = `
      <img src="${photo.image}">
      <div class="caption">${photo.time}</div>
    `;
    dexGrid.appendChild(card);
  });
}

function flashEffect() {
  flash.classList.add("flash");
  setTimeout(() => flash.classList.remove("flash"), 200);
}

captureBtn.addEventListener("click", () => {
  if (!video.videoWidth) return;

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0);

  const image = canvas.toDataURL("image/jpeg", 0.92);

  savePhoto(image);
  flashEffect();
});

galleryBtn.addEventListener("click", () => {
  renderGallery();
  gallery.classList.add("show");
});

closeGallery.addEventListener("click", () => {
  gallery.classList.remove("show");
});

initCamera();
</script>

</body>
</html>
