<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WILDLIFE DEX // TACTILE CAM V3.7</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

    <style>
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100vh; height: 100dvh; background-color: #121110; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Helvetica, Arial, sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .camera-container { width: 100%; height: 100%; background-color: #d7be9f; display: grid; padding: 12px; position: relative; gap: 10px; grid-template-columns: 140px 1fr 140px; grid-template-rows: 1fr; }
        @media (orientation: portrait) { .camera-container { grid-template-columns: 1fr; grid-template-rows: 110px 1fr 140px; } .panel-left { flex-direction: row !important; width: 100% !important; height: 100% !important; padding: 0 10px !important; } .panel-right { flex-direction: row-reverse !important; width: 100% !important; height: 100% !important; padding: 0 10px !important; gap: 15px; } .sunken-tray-vertical-barrel { width: 120px !important; height: 46px !important; } .vertical-barrel-roller { width: 106px !important; height: 34px !important; background: repeating-linear-gradient(90deg, #c5c5c5 0px, #c5c5c5 10px, #ffffff 10px, #ffffff 12px, #a3a3a3 12px, #a3a3a3 16px) !important; } .giant-shutter-red { width: 76px !important; height: 76px !important; } .right-action-cluster { flex-direction: row !important; width: auto !important; gap: 12px !important; } }
        .panel-left { display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 10px 0; z-index: 10; }
        .sunken-tray-horizontal { background-color: #beaa91; width: 110px; height: 42px; border-radius: 21px; box-shadow: inset 2px 3px 6px rgba(0,0,0,0.3); position: relative; display: flex; align-items: center; }
        .black-knob-slider { width: 36px; height: 36px; background-color: #242221; border-radius: 50%; box-shadow: 2px 3px 6px rgba(0,0,0,0.5); position: absolute; left: 3px; transition: left 0.2s ease; }
        .sunken-tray-vertical-barrel { background-color: #beaa91; width: 110px; height: 160px; border-radius: 24px; box-shadow: inset 3px 4px 8px rgba(0,0,0,0.4); overflow: hidden; display: flex; justify-content: center; align-items: center; touch-action: none; }
        .vertical-barrel-roller { width: 94px; height: 144px; border-radius: 16px; background: repeating-linear-gradient(0deg, #c5c5c5 0px, #c5c5c5 12px, #ffffff 12px, #ffffff 14px, #a3a3a3 14px, #a3a3a3 20px); }
        .matte-round-btn { width: 46px; height: 46px; background-color: #242221; border: none; border-radius: 50%; color: #ffffff; font-size: 14px; font-weight: bold; display: flex; justify-content: center; align-items: center; box-shadow: 2px 4px 8px rgba(0,0,0,0.4), inset 0px 1px 1px #666; cursor: pointer; }
        .matte-round-btn:active { transform: scale(0.96); background-color: #1a1918; }
        .panel-center { position: relative; width: 100%; height: 100%; overflow: hidden; }
        .viewfinder-viewport { width: 100%; height: 100%; background-color: #000000; border-radius: 24px; position: relative; overflow: hidden; box-shadow: inset 0px 0px 20px rgba(0,0,0,0.8); }
        #embedded-live-video { width: 100%; height: 100%; object-fit: cover; transform-origin: center center; transition: transform 0.25s cubic-bezier(0.1, 0.8, 0.25, 1); cursor: pointer; }
        .calibration-hint { position: absolute; top: 70px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); color: #fff; font-size: 10px; font-weight: bold; padding: 4px 8px; border-radius: 4px; pointer-events: none; letter-spacing: 1px; opacity: 0.7; z-index: 20; }
        .hud-center-stats { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); text-align: center; color: #ffffff; text-shadow: 0px 2px 4px rgba(0,0,0,0.7); pointer-events: none; z-index: 20; }
        .hud-ticks { font-size: 14px; letter-spacing: 5px; opacity: 0.6; margin-bottom: 2px; }
        .hud-label { font-size: 10px; font-weight: bold; letter-spacing: 2px; opacity: 0.8; }
        .hud-main-value { font-size: 24px; font-weight: 900; }
        .hud-bottom-bar { position: absolute; bottom: 12px; left: 15px; right: 15px; display: flex; justify-content: space-between; align-items: center; pointer-events: none; z-index: 20; }
        .hud-pill-box { background: rgba(0, 0, 0, 0.45); border: 1px solid rgba(255,255,255,0.35); border-radius: 6px; padding: 4px 10px; font-size: 11px; font-weight: bold; color: white; backdrop-filter: blur(5px); }
        .hud-inline-metrics { display: flex; gap: 12px; font-size: 11px; font-weight: bold; color: white; }
        .manual-keyboard-override { width: calc(100% - 30px); position: absolute; bottom: 55px; left: 15px; background: rgba(18,17,16,0.95); border: 1px dashed #555; border-radius: 8px; color: #fff; padding: 10px; text-align: center; font-size: 11px; display: none; z-index: 22; }
        .panel-right { display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 10px 0; z-index: 10; }
        .sunken-tray-horizontal-barrel { background-color: #beaa91; width: 115px; height: 48px; border-radius: 14px; box-shadow: inset 2px 3px 6px rgba(0,0,0,0.4); overflow: hidden; display: flex; justify-content: center; align-items: center; touch-action: none; }
        .horizontal-barrel-roller { width: 102px; height: 38px; border-radius: 8px; background: repeating-linear-gradient(90deg, #c5c5c5 0px, #c5c5c5 10px, #ffffff 10px, #ffffff 12px, #a3a3a3 12px, #a3a3a3 16px); }
        .giant-shutter-red { width: 95px; height: 95px; background-color: #ff3b30; border: none; border-radius: 50%; cursor: pointer; box-shadow: inset 1px 2px 3px rgba(255,255,255,0.4), 0px 6px 12px rgba(0,0,0,0.45); display: flex; justify-content: center; align-items: center; }
        .giant-shutter-red:active { transform: scale(0.95); box-shadow: 0px 2px 4px rgba(0,0,0,0.4); }
        .shutter-cross-icon { width: 22px; height: 4px; background-color: #ffffff; position: relative; }
        .shutter-cross-icon::before { content: ""; width: 4px; height: 22px; background-color: #ffffff; position: absolute; top: -9px; left: 9px; }
        .right-action-cluster { display: flex; flex-direction: column; gap: 10px; }
        .hud-telemetry-overlay-card { position: absolute; top: 10px; bottom: 10px; left: 10px; right: 10px; background-color: rgba(18, 17, 16, 0.98); border-radius: 18px; padding: 15px; display: none; grid-template-columns: 1fr; grid-template-rows: 140px 1fr; gap: 15px; z-index: 100; }
        @media (min-width: 601px) { .hud-telemetry-overlay-card { grid-template-columns: 170px 1fr; grid-template-rows: 1fr; } }
        .captured-polaroid-frame { width: 100%; height: 100%; background-color: #f4f1eb; padding: 8px 8px 24px 8px; display: flex; flex-direction: column; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #canvas-snapshot-output { width: 100%; height: 100%; object-fit: cover; background-color: #222; }
        .card-info-pane { display: flex; flex-direction: column; justify-content: space-between; }
        .card-header { font-size: 10px; color: #ff3b30; font-weight: bold; letter-spacing: 2px; }
        .card-title { font-size: 18px; font-weight: 900; color: #fff; margin: 2px 0; }
        .card-sub { font-size: 11px; color: #beaa91; font-style: italic; }
        .card-body { font-size: 11px; color: #e5e5ea; line-height: 1.4; margin-top: 5px; }
        .card-actions { display: flex; gap: 8px; margin-top: 10px; }
        .action-btn { flex: 1; padding: 10px; border-radius: 6px; border: none; font-weight: bold; font-size: 11px; cursor: pointer; transition: background 0.2s; }
        .btn-save { background-color: #ffffff; color: #000; }
        .btn-save:active { background-color: #4cd964; color: #fff; }
        .btn-reset { background-color: #333; color: #fff; }
        .dex-dashboard-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #121110; z-index: 200; display: none; flex-direction: column; padding: 20px; overflow-y: auto; }
        .dex-header-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px dashed #beaa91; padding-bottom: 10px; margin-bottom: 20px; }
        .dex-title { color: #d7be9f; font-size: 20px; font-weight: 900; letter-spacing: 1px; }
        .dex-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; padding-bottom: 40px; }
        .mini-polaroid-card { background-color: #f4f1eb; padding: 6px 6px 18px 6px; display: flex; flex-direction: column; box-shadow: 0 4px 8px rgba(0,0,0,0.3); border-radius: 2px; }
        .mini-polaroid-img { width: 100%; aspect-ratio: 1; object-fit: cover; background-color: #333; }
        .mini-polaroid-label { color: #121110; font-size: 11px; font-weight: bold; text-align: center; margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .empty-dex-notice { color: #beaa91; text-align: center; font-size: 13px; font-style: italic; grid-column: 1 / -1; padding: 4px 0; }
    </style>
</head>
<body>

    <div class="camera-container">
        <div class="panel-left">
            <div class="sunken-tray-horizontal"><div class="black-knob-slider" id="knob-left"></div></div>
            <div class="sunken-tray-vertical-barrel" id="zoom-roller-wheel"><div class="vertical-barrel-roller" id="zoom-barrel-graphic"></div></div>
            <button class="matte-round-btn" id="btn-mode-m">M</button>
        </div>
        <div class="panel-center">
            <div class="viewfinder-viewport" id="viewport-frame">
                <video id="embedded-live-video" autoplay playsinline muted></video>
                <div class="calibration-hint" id="cal-hint">Tap screen to rotate angle</div>
                <div class="hud-center-stats">
                    <div class="hud-ticks">▪ ▪ ▪ ▪ ▪ <span style="color:#ff3b30;">▪</span> ▪ ▪ ▪ ▪</div>
                    <div class="hud-label" id="hud-stat-label">AI CORE STATUS</div>
                    <div class="hud-main-value" id="hud-stat-value">BOOTING...</div>
                </div>
                <div class="hud-bottom-bar">
                    <div class="hud-pill-box" id="hud-lower-pill">♦ INITIALIZING AI</div>
                    <div class="hud-inline-metrics"><div>⚏ 18</div><div>☀ 5440K</div><div style="color:#ff3b30;">📊||ı|</div></div>
                </div>
                <input type="text" id="manual-text-input" class="manual-keyboard-override" placeholder="[ AI OVERRIDE: TYPE SPECIES NAME ]">
                <div class="hud-telemetry-overlay-card" id="result-overlay">
                    <div class="captured-polaroid-frame"><canvas id="canvas-snapshot-output"></canvas></div>
                    <div class="card-info-pane">
                        <div>
                            <div class="card-header" id="res-header">Wildlife-dex V3.7 Neural Scan</div>
                            <div class="card-title" id="res-name">Specimen Active</div>
                            <div class="card-sub" id="res-science">Taxonomy Branch</div>
                            <div class="card-body" id="res-fact">Processing data loops...</div>
                        </div>
                        <div class="card-actions">
                            <button class="action-btn btn-save" id="btn-log-dex">＋ Register Entry</button>
                            <button class="action-btn btn-reset" id="btn-close-card">✖ Resume Stream</button>
                        </div>
                    </div>
                </div>
                <div class="dex-dashboard-overlay" id="dex-gallery-screen">
                    <div class="dex-header-bar">
                        <div class="dex-title">📖 COLLECTED WILDLIFE INDEX</div>
                        <button class="action-btn btn-reset" id="btn-close-gallery" style="max-width: 90px; padding: 6px 12px;">✕ Close</button>
                    </div>
                    <div class="dex-grid" id="dex-cards-container"></div>
                </div>
            </div>
        </div>
        <div class="panel-right">
            <div class="sunken-tray-horizontal-barrel" id="stat-roller-wheel"><div class="horizontal-barrel-roller" id="stat-barrel-graphic"></div></div>
            <button class="giant-shutter-red" id="shutter-trigger"><div class="shutter-cross-icon"></div></button>
            <div class="right-action-cluster"><button class="matte-round-btn" id="btn-open-dex" style="background-color: #beaa91; color: #121110;">📖</button></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('embedded-live-video');
        const statusVal = document.getElementById('hud-stat-value');
        let aiModel = null;
        let currentScanPayload = null;

        // Initialize AI with Timeout Fallback
        async function initAI() {
            console.log("Loading AI...");
            try {
                // Set a 5-second race timer
                const timeout = new Promise((_, reject) => setTimeout(() => reject("AI_TIMEOUT"), 5000));
                aiModel = await Promise.race([mobilenet.load(), timeout]);
                statusVal.innerText = 'READY';
                statusVal.style.color = '#4cd964';
            } catch(e) { 
                console.error("Neural core error:", e);
                statusVal.innerText = 'OFFLINE';
                statusVal.style.color = '#ff3b30';
            }
        }

        // Camera Logic
        navigator.mediaDevices.getUserMedia({video: {facingMode: "environment"}})
            .then(s => video.srcObject = s)
            .then(initAI)
            .catch(err => {
                console.error("Camera access denied:", err);
                statusVal.innerText = 'NO CAMERA';
            });

        // Shutter Trigger with Confidence Threshold
        document.getElementById('shutter-trigger').addEventListener('click', async () => {
            const canvas = document.getElementById('canvas-snapshot-output');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            document.getElementById('result-overlay').style.display = "grid";
            document.getElementById('res-name').innerText = aiModel ? "ANALYZING..." : "SYSTEM OFFLINE";
            
            if (!aiModel) {
                document.getElementById('res-fact').innerText = "AI core not loaded. Please manual override.";
                return;
            }
            
            await new Promise(r => setTimeout(r, 1200));
            
            let name = "INCONCLUSIVE", science = "SIGNAL WEAK", fact = "The neural core could not achieve a stable lock.";
            
            const manual = document.getElementById('manual-text-input').value.trim();
            if (manual) {
                name = manual.toUpperCase(); science = "MANUAL LOG"; fact = "Data entered by operator.";
            } else {
                const results = await aiModel.classify(canvas);
                if (results.length > 0 && results[0].probability > 0.60) {
                    name = results[0].className.toUpperCase();
                    let conf = Math.round(results[0].probability * 100);
                    science = `MATCH: ${conf}% CONFIDENCE`;
                    fact = "Neural scan verified with high probability.";
                }
            }
            
            document.getElementById('res-name').innerText = name;
            document.getElementById('res-science').innerText = science;
            document.getElementById('res-fact').innerText = fact;
            currentScanPayload = {name, science, fact, image: canvas.toDataURL()};
        });

        // Register Entry
        document.getElementById('btn-log-dex').addEventListener('click', () => {
            if(!currentScanPayload) return;
            let db = JSON.parse(localStorage.getItem('wildlifeDexEntries') || '[]');
            db.unshift(currentScanPayload);
            localStorage.setItem('wildlifeDexEntries', JSON.stringify(db));
            document.getElementById('result-overlay').style.display = "none";
        });

        // Gallery Display
        document.getElementById('btn-open-dex').addEventListener('click', () => {
            const cont = document.getElementById('dex-cards-container');
            cont.innerHTML = "";
            let entries = JSON.parse(localStorage.getItem('wildlifeDexEntries') || '[]');
            if(entries.length === 0) cont.innerHTML = `<div class="empty-dex-notice">No specimens registered.</div>`;
            entries.forEach(item => {
                cont.innerHTML += `<div class="mini-polaroid-card"><img class="mini-polaroid-img" src="${item.image}"><div class="mini-polaroid-label">${item.name}</div></div>`;
            });
            document.getElementById('dex-gallery-screen').style.display = "flex";
        });

        document.getElementById('btn-close-gallery').addEventListener('click', () => {
            document.getElementById('dex-gallery-screen').style.display = "none";
        });

        document.getElementById('btn-close-card').addEventListener('click', () => {
            document.getElementById('result-overlay').style.display = "none";
        });
    </script>
</body>
</html>
