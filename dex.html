<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wildlife Dex</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: #fff; margin: 0; display: flex; flex-direction: column; align-items: center; }
        #camera-feed { width: 100%; max-width: 500px; background: #000; }
        #btn-scan { width: 100%; max-width: 500px; padding: 20px; background: #007aff; color: white; border: none; font-size: 18px; font-weight: bold; }
        #result-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; width: 90%; max-width: 400px; text-align: center; }
        .btn-action { width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <video id="camera-feed" autoplay playsinline></video>
    <canvas id="snapshot-canvas" style="display:none;"></canvas>
    <button id="btn-scan">🔍 Scan Wildlife</button>

    <div id="result-overlay">
        <div class="card">
            <h2 id="res-name">Species Identified</h2>
            <p id="res-fact">The camera has captured your find!</p>
            <button id="btn-save" class="btn-action" style="background:#4cd964;">✓ Register Entry</button>
            <button id="btn-close" class="btn-action" style="background:#444; color:#fff;">Close</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('camera-feed');
        const canvas = document.getElementById('snapshot-canvas');

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(stream => { video.srcObject = stream; })
        .catch(err => alert("Camera error: " + err.message));

        document.getElementById('btn-scan').onclick = () => {
            canvas.width = 300;
            canvas.height = 300;
            canvas.getContext('2d').drawImage(video, 0, 0, 300, 300);
            document.getElementById('result-overlay').style.display = "flex";
        };

        document.getElementById('btn-save').onclick = () => {
            const entry = {
                name: "Woodpecker",
                image: canvas.toDataURL('image/jpeg', 0.5)
            };
            
            let dex = JSON.parse(localStorage.getItem('dex') || '[]');
            dex.unshift(entry);
            localStorage.setItem('dex', JSON.stringify(dex));
            
            alert("Entry saved to Dex!");
            document.getElementById('result-overlay').style.display = "none";
        };

        document.getElementById('btn-close').onclick = () => {
            document.getElementById('result-overlay').style.display = "none";
        };
    </script>
</body>
</html>
