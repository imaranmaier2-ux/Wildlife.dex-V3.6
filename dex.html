<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>W.G. JONES // PRO-DEX</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        /* Force body to fill the entire physical screen area */
        body { 
            background: #d2b48c; 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* This container uses a fixed height/width relative to the 
           maximum dimension of your screen, forcing landscape.
        */
        .camera-body {
            display: grid;
            grid-template-columns: 120px 1fr 120px;
            width: 95vw;
            height: 80vh;
            background: #e6cba9;
            border-radius: 40px;
            padding: 20px;
            gap: 20px;
        }

        .viewport-frame {
            background: #000;
            border-radius: 25px;
            border: 8px solid #c4a984;
            overflow: hidden;
            /* Keeps the viewport square and prevents squishing */
            aspect-ratio: 1/1; 
        }

        #live-feed {
            width: 100%; height: 100%;
            object-fit: cover;
        }

        .sidebar { display: flex; flex-direction: column; justify-content: space-between; align-items: center; }
        .btn-shutter { width: 90px; height: 90px; background: #ff3b30; border-radius: 50%; border: none; }
        .btn-folder { width: 60px; height: 60px; background: #c4a984; border-radius: 15px; border: none; }
    </style>
</head>
<body>
    <div class="camera-body">
        <div class="sidebar">
            <button class="btn-folder">📁</button>
        </div>
        <div class="viewport-frame">
            <video id="live-feed" autoplay playsinline muted></video>
        </div>
        <div class="sidebar">
            <button class="btn-shutter" id="shutter"></button>
        </div>
    </div>

    <script>
        const video = document.getElementById('live-feed');
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(s => video.srcObject = s);
    </script>
</body>
</html>
