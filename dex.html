<!DOCTYPE html>
<html>
<body style="background:black; color:white; font-family:sans-serif;">

    <h1>DEBUGGER</h1>
    <div id="debug-log" style="color:yellow; border:1px solid white; padding:10px; margin-bottom:10px;">Starting...</div>
    
    <video id="vid" autoplay playsinline style="width:100%"></video>
    <button id="btn" style="width:100%; padding:20px; font-size:20px;">TEST SCAN</button>

    <script>
        const log = document.getElementById('debug-log');
        log.innerText = "Script Loaded.";

        navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => {
            document.getElementById('vid').srcObject = stream;
            log.innerText = "Camera Connected.";
        })
        .catch(err => {
            log.innerText = "CAMERA ERROR: " + err.message;
        });

        document.getElementById('btn').onclick = () => {
            log.innerText = "Button clicked! Attempting scan...";
            alert("Button Clicked Successfully");
        };
    </script>
</body>
</html>
