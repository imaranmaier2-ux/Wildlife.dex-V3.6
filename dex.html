<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CAM PRO // W.G. JONES</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { width: 100vw; height: 100vh; background: #000; overflow: hidden; display: flex; }

        /* Left and Right Control Strips */
        .sidebar { width: 100px; flex-shrink: 0; background: #121110; display: flex; flex-direction: column; align-items: center; justify-content: space-around; z-index: 10; }

        /* The Viewfinder is now absolute to prevent flex-box from squishing it */
        .panel-center { flex-grow: 1; position: relative; background: #000; overflow: hidden; }
        
        #embedded-live-video {
            position: absolute;
            top: 50%; left: 50%;
            width: 100%; height: 100%;
            object-fit: cover; /* This makes it look like a real camera */
            transform: translate(-50%, -50%);
        }

        .giant-shutter-red { width: 70px; height: 70px; background: #ff3b30; border-radius: 50%; border: none; }
        .btn-gallery { width: 50px; height: 50px; background: #333; color: white; border-radius: 50%; border: none; }

        #gallery-overlay { position: fixed; inset: 0; background: #000; z-index: 500; display: none; padding: 20px; color: white; overflow-y: auto; }
        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .gallery-item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="gallery-overlay">
        <button onclick="document.getElementById('gallery-overlay').style.display='none'" style="padding:10px; background:#333; color:white; border:none;">CLOSE</button>
        <div class="gallery-grid" id="gallery-list"></div>
    </div>

    <div class="sidebar">
        <button class="btn-gallery" onclick="document.getElementById('gallery-overlay').style.display='block'">📁</button>
    </div>
    
    <div class="panel-center">
        <video id="embedded-live-video" autoplay playsinline muted></video>
    </div>

    <div class="sidebar">
        <button class="giant-shutter-red" id="shutter-trigger"></button>
    </div>

    <script>
        const video = document.getElementById('embedded-live-video');
        let galleryData = JSON.parse(localStorage.getItem('my_jones_gallery')) || [];

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(s => video.srcObject = s);

        document.getElementById('shutter-trigger').addEventListener('click', () => {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            galleryData.push({ img: canvas.toDataURL('image/png') });
            localStorage.setItem('my_jones_gallery', JSON.stringify(galleryData));
            renderGallery();
        });

        function renderGallery() {
            document.getElementById('gallery-list').innerHTML = galleryData.map(i => `<div class="gallery-item"><img src="${i.img}"></div>`).join('');
        }
        renderGallery();
    </script>
</body>
</html>
