<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>W.G. JONES // TACTILE CAM PRO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; font-family: -apple-system, sans-serif; overflow: hidden; }

        /* Main UI Container: Fluid width */
        .camera-container {
            display: flex;
            width: 100vw; height: 100vh;
            background-color: #000;
        }

        /* Sidebar Panels - Fixed width to prevent squeezing */
        .panel-left, .panel-right {
            width: 120px; 
            flex-shrink: 0;
            display: flex; flex-direction: column; justify-content: space-around;
            align-items: center; padding: 20px 0;
            background: #121110;
            z-index: 10;
        }

        /* Center Panel: Expands to fill available space */
        .panel-center {
            flex-grow: 1;
            padding: 10px;
            position: relative;
        }

        .viewfinder-viewport {
            width: 100%; height: 100%;
            background-color: #000;
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            border: 4px solid #333;
        }

        #embedded-live-video {
            width: 100%; height: 100%;
            object-fit: cover; /* This prevents the "squeezed" look */
            transform: scaleX(-1); /* Mirror view for natural feel */
        }

        /* UI Elements */
        .giant-shutter-red { width: 80px; height: 80px; background-color: #ff3b30; border-radius: 50%; border: none; cursor: pointer; box-shadow: 0 4px 10px rgba(255,59,48,0.3); }
        .btn-gallery { width: 60px; height: 60px; background: #222; color: white; border-radius: 50%; border: none; font-size: 24px; cursor: pointer; }

        /* Gallery Overlay */
        #gallery-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 500; display: none; padding: 20px;
            color: white; overflow-y: auto;
        }
        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .gallery-item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="gallery-overlay">
        <button onclick="document.getElementById('gallery-overlay').style.display='none'" style="padding:15px; margin-bottom:20px;">BACK TO CAMERA</button>
        <div class="gallery-grid" id="gallery-list"></div>
    </div>

    <div class="camera-container">
        <div class="panel-left">
            <button class="btn-gallery" onclick="document.getElementById('gallery-overlay').style.display='block'">📁</button>
        </div>
        
        <div class="panel-center">
            <div class="viewfinder-viewport">
                <video id="embedded-live-video" autoplay playsinline muted></video>
            </div>
        </div>

        <div class="panel-right">
            <button class="giant-shutter-red" id="shutter-trigger"></button>
        </div>
    </div>

    <script>
        const video = document.getElementById('embedded-live-video');
        let galleryData = JSON.parse(localStorage.getItem('my_jones_gallery')) || [];

        // Camera Initialization
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Camera access denied. Please enable in browser settings.");
            }
        }

        // Capture Logic
        document.getElementById('shutter-trigger').addEventListener('click', () => {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.scale(-1, 1); // Flip horizontally to match mirror view
            ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
            
            galleryData.push({ img: canvas.toDataURL('image/png') });
            localStorage.setItem('my_jones_gallery', JSON.stringify(galleryData));
            renderGallery();
        });

        function renderGallery() {
            const list = document.getElementById('gallery-list');
            list.innerHTML = galleryData.map(item => `
                <div class="gallery-item"><img src="${item.img}"></div>
            `).join('');
        }

        startCamera();
        renderGallery();
    </script>
</body>
</html>
