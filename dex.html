<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>W.G. JONES // PRO-DEX</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: #d2b48c; 
            overflow: hidden; 
            width: 100vw; 
            height: 100vh;
        }

        /* This container pins the camera to the full screen */
        .camera-ui {
            position: fixed;
            inset: 0;
            display: grid;
            grid-template-columns: 120px 1fr 120px;
            padding: 20px;
            gap: 20px;
        }

        /* Sidebar Panels */
        .panel { display: flex; flex-direction: column; justify-content: space-between; align-items: center; }

        /* The Viewfinder - The core of the NotBoring look */
        .viewport {
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            border: 8px solid #c4a984;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #live-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Buttons */
        .btn-red { width: 90px; height: 90px; background: #ff3b30; border-radius: 50%; border: 6px solid #fff; }
        .btn-ui { width: 60px; height: 60px; background: #c4a984; border-radius: 15px; border: none; }
    </style>
</head>
<body>

    <div class="camera-ui">
        <div class="panel">
            <button class="btn-ui" onclick="alert('DEX OPEN')">📁</button>
        </div>
        
        <div class="viewport">
            <video id="live-feed" autoplay playsinline muted></video>
        </div>

        <div class="panel">
            <button class="btn-red" id="shutter"></button>
        </div>
    </div>

    <script>
        const video = document.getElementById('live-feed');
        // Force Landscape Lock if possible
        if (screen.orientation) {
            screen.orientation.lock('landscape').catch(() => {});
        }

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(s => video.srcObject = s);
    </script>
</body>
</html>
