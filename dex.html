<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W.G. Jones Wildlife Dex</title>
    <style>
        :root { --bg: #000; --card: #151515; --text: #fff; --accent: #333; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; }
        
        /* Viewfinder */
        #viewfinder { width: 100%; aspect-ratio: 1/1; background: #000; border: 4px solid var(--accent); border-radius: 30px; overflow: hidden; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Controls */
        .controls { display: flex; justify-content: center; padding: 20px; }
        .capture-btn { width: 80px; height: 80px; border-radius: 50%; background: #fff; border: 8px solid #444; cursor: pointer; }
        
        /* Nav */
        .nav { display: flex; gap: 10px; margin: 20px 0; }
        .tab { background: #222; padding: 10px 20px; border-radius: 20px; border: none; color: #fff; cursor: pointer; }
        .tab.active { background: #fff; color: #000; }
        
        /* Sections */
        .section { display: none; }
        .section.active { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: var(--card); padding: 10px; border-radius: 20px; text-align: center; border: 1px solid #333; }
        .card img { width: 100%; aspect-ratio: 1/1; border-radius: 15px; object-fit: cover; }
    </style>
</head>
<body>

    <div id="viewfinder"></div>
    
    <div class="controls">
        <button class="capture-btn" id="snap"></button>
    </div>

    <div class="nav">
        <button class="tab active" onclick="switchTab('dex')">Dex List</button>
        <button class="tab" onclick="switchTab('gallery')">Gallery</button>
    </div>

    <div id="dex" class="section active"></div>
    <div id="gallery" class="section"></div>

    <script>
        const species = ["Red-cockaded Woodpecker", "White-tailed Deer", "Eastern Gray Squirrel", "Pine Warbler"];
        let gallery = JSON.parse(localStorage.getItem('my_gallery')) || [];

        function switchTab(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function initCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            const video = document.createElement('video');
            video.srcObject = stream;
            video.play();
            document.getElementById('viewfinder').appendChild(video);
        }

        document.getElementById('snap').addEventListener('click', () => {
            const video = document.querySelector('video');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const imgData = canvas.toDataURL('image/png');
            
            gallery.push({ name: species[Math.floor(Math.random() * species.length)], img: imgData });
            localStorage.setItem('my_gallery', JSON.stringify(gallery));
            renderGallery();
        });

        function renderGallery() {
            const container = document.getElementById('gallery');
            container.innerHTML = gallery.map(item => `
                <div class="card">
                    <img src="${item.img}">
                    <p>${item.name}</p>
                </div>
            `).join('');
        }

        initCamera();
        renderGallery();
    </script>
</body>
</html>
